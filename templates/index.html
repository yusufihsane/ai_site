<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>AI Chat</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
}

#chat {
    width: 400px;
    height: 500px;
    overflow-y: auto;
    background: #1e293b;
    padding: 10px;
    border-radius: 10px;
}

.user { color: #38bdf8; margin: 5px; }
.ai { color: #22c55e; margin: 5px; }

input {
    width: 300px;
    padding: 10px;
}
button {
    padding: 10px;
}
</style>
</head>

<body>

<h1>🤖 AI Chat</h1>

<div id="chat"></div>

<input id="mesaj" placeholder="Bir şey yaz...">
<button onclick="gonder()">Gönder</button>

<script>
async function gonder() {
    let mesaj = document.getElementById("mesaj").value;

    let res = await fetch("/sor", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({mesaj})
    });

    let data = await res.json();

    document.getElementById("chat").innerHTML +=
        "<div class='user'>Sen: " + mesaj + "</div>";

    document.getElementById("chat").innerHTML +=
        "<div class='ai'>AI: " + data.cevap + "</div>";
}
</script>

</body>
</html>
